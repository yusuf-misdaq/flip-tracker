<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-card">
    <h1 class="brand">Ledger</h1>
    <p class="brand-sub">Built to last. Tracked the same way.</p>
    <form id="login-form">
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Enter</button>
    </form>
    <p id="login-error" class="error-text"></p>
  </div>
</div>

<div id="app-screen" class="screen hidden">
  <header class="topbar">
    <h1 class="brand">Ledger</h1>
    <button id="logout-btn" class="ghost-btn">Sign out</button>
  </header>

  <main class="main">

    <section class="gauge-card">
      <div class="gauge-wrap">
        <svg id="gauge-svg" viewBox="0 0 200 200" class="gauge-svg">
          <circle cx="100" cy="100" r="88" class="gauge-track"/>
          <circle cx="100" cy="100" r="88" class="gauge-fill" id="gauge-fill"/>
        </svg>
        <div class="gauge-center">
          <span class="gauge-amount" id="gauge-amount">$0</span>
          <span class="gauge-goal" id="gauge-goal-label">of $1,000</span>
        </div>
      </div>
      <div class="gauge-stats">
        <div class="stat">
          <span class="stat-num" id="stat-items">0</span>
          <span class="stat-label">items sold</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-avg-margin">$0</span>
          <span class="stat-label">avg margin</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-days">—</span>
          <span class="stat-label">avg days to sell</span>
        </div>
      </div>
      <button id="edit-goal-btn" class="link-btn">Adjust this month's goal</button>
    </section>

    <section class="add-section">
      <button id="show-form-btn" class="primary-btn">+ Log an item</button>
    </section>

    <section id="item-form-card" class="form-card hidden">
      <h2 id="form-title">Log an item</h2>
      <form id="item-form">
        <input type="hidden" id="item-id">

        <label>
          Item name
          <input type="text" id="f-name" placeholder="e.g. Herman Miller chair" required>
        </label>

        <label>
          Category
          <select id="f-category">
            <option>Furniture</option>
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Tools</option>
            <option>Other</option>
          </select>
        </label>

        <div class="row">
          <label>
            What you paid
            <input type="number" id="f-cost" placeholder="0.00" step="0.01" min="0" required>
          </label>
          <label>
            Sold for <span class="optional">(leave blank if unsold)</span>
            <input type="number" id="f-sold-price" placeholder="0.00" step="0.01" min="0">
          </label>
        </div>

        <div class="row">
          <label>
            Date acquired
            <input type="date" id="f-date-acquired" required>
          </label>
          <label>
            Date sold <span class="optional">(if sold)</span>
            <input type="date" id="f-date-sold">
          </label>
        </div>

        <label>
          Notes <span class="optional">(optional)</span>
          <textarea id="f-notes" rows="2" placeholder="Source, condition, buyer, whatever's useful later"></textarea>
        </label>

        <label>
          Original listing URL <span class="optional">(the seller's post)</span>
          <input type="url" id="f-source-url" placeholder="https://facebook.com/marketplace/item/...">
        </label>

        <label>
          Your listing URL <span class="optional">(where you posted it for resale)</span>
          <input type="url" id="f-listing-url" placeholder="https://facebook.com/marketplace/item/...">
        </label>

        <div class="form-actions">
          <button type="button" id="cancel-form-btn" class="ghost-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save item</button>
        </div>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>Items</h2>
        <select id="filter-select">
          <option value="all">All</option>
          <option value="unsold">Unsold</option>
          <option value="sold">Sold</option>
          <option value="Furniture">Furniture</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Tools">Tools</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div id="items-list" class="items-list">
        <p class="empty-state">Nothing logged yet. The first entry starts the ledger.</p>
      </div>
    </section>

  </main>
</div>

<div id="goal-modal" class="modal hidden">
  <div class="modal-card">
    <h2>This month's goal</h2>
    <label>
      Target for <span id="goal-month-label"></span>
      <input type="number" id="goal-input" min="0" step="50">
    </label>
    <div class="form-actions">
      <button type="button" id="goal-cancel-btn" class="ghost-btn">Cancel</button>
      <button type="button" id="goal-save-btn" class="primary-btn">Save goal</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
